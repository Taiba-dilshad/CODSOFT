<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculator</title>
    <style>
        body {
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0;
            color: #ffffff;
            overflow: hidden;
        }

        .container {
            display: flex;
            align-items: center;
            gap: 80px;
            max-width: 1100px;
            padding: 20px;
        }

        @media(max-width:900px) {
            .container { flex-direction: column; text-align: center; gap: 40px; }
        }

        .main h1 {
            font-size: 4.5rem;
            margin: 0;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .main h1 span { color: #00d2ff; font-size: 2.2rem; vertical-align: super; }

        .main p {
            color: rgba(255, 255, 255, 0.4);
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin: 5px 0 0 5px;
        }

        .calculator {
            width: 340px;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
            padding: 35px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
        }

        .history-view {
            color: rgba(255, 255, 255, 0.3);
            text-align: right;
            height: 20px;
            font-size: 0.9rem;
            margin-bottom: 5px;
        }

        .display {
            color: #ffffff;
            font-size: 3.5rem;
            text-align: right;
            padding: 0 10px 30px 10px;
            min-height: 70px;
            font-weight: 300;
            word-wrap: break-word;
        }

        /* The Grid that fixes the "one line" issue */
        .button-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        .btn {
            padding: 22px 0;
            font-size: 1.2rem;
            cursor: pointer;
            border-radius: 20px;
            border: 1px solid transparent;
            transition: all 0.2s ease;
            background: rgba(255, 255, 255, 0.05);
            color: white;
            font-weight: 500;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-3px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn:active { transform: scale(0.92); }

        .operator { background: rgba(255, 255, 255, 0.1); color: #00d2ff; font-weight: 700; }

        .equal {
            grid-row: span 2;
            background: #00d2ff;
            color: #002b36;
            font-weight: 800;
            font-size: 1.6rem;
            box-shadow: 0 8px 20px rgba(0, 210, 255, 0.3);
        }

        .equal:hover { background: #33dbff; }

        .zero { grid-column: span 2; }
    </style>
</head>
<body>
    <div class="container">
        <header class="main">
            <h1>SmartCalc<span>.io</span></h1>
            <p>Minimalist Design . Precision Logic</p>
        </header>

        <div class="calculator">
            <div class="history-view" id="history"></div>
            <div class="display" id="display">0</div>
            
            <div class="button-grid">
                <button class="btn operator" onclick="clearScreen()">C</button>
                <button class="btn operator" onclick="appendValue('/')">/</button>
                <button class="btn operator" onclick="appendValue('*')">×</button>
                <button class="btn operator" onclick="del()">DEL</button>
                
                <button class="btn" onclick="appendValue('7')">7</button>
                <button class="btn" onclick="appendValue('8')">8</button>
                <button class="btn" onclick="appendValue('9')">9</button>
                <button class="btn operator" onclick="appendValue('-')">-</button>
                
                <button class="btn" onclick="appendValue('4')">4</button>
                <button class="btn" onclick="appendValue('5')">5</button>
                <button class="btn" onclick="appendValue('6')">6</button>
                <button class="btn operator" onclick="appendValue('+')">+</button>
                
                <button class="btn" onclick="appendValue('1')">1</button>
                <button class="btn" onclick="appendValue('2')">2</button>
                <button class="btn" onclick="appendValue('3')">3</button>
                <button class="btn equal" onclick="calculate()">=</button>
                
                <button class="btn zero" onclick="appendValue('0')">0</button>
                <button class="btn" onclick="appendValue('.')">.</button>
            </div>
        </div>
    </div>
    <script>
        const display = document.getElementById('display');
        const history = document.getElementById('history');

        function appendValue(val) {
            if (display.innerText === '0' || display.innerText === 'Error') {
                display.innerText = val;
            } else {
                display.innerText += val;
            }
        }

        function clearScreen() {
            display.innerText = '0';
            history.innerText = '';
        }

        function del() {
            if (display.innerText.length === 1 || display.innerText === 'Error') {
                display.innerText = '0';
            } else {
                display.innerText = display.innerText.slice(0, -1);
            }
        }

        function calculate() {
            try {
                let expression = display.innerText;
                // Using new Function() as a safer alternative to eval()
                let result = new Function('return ' + expression)();
                
                history.innerText = expression + " =";
                // Limiting decimals to 8 places for clean UI
                display.innerText = Number.isInteger(result) ? result : parseFloat(result.toFixed(8));
            } catch (e) {
                display.innerText = 'Error';
            }
        }

        // Add Physical Keyboard Support
        window.addEventListener('keydown', (e) => {
            if ((e.key >= '0' && e.key <= '9') || ['+', '-', '*', '/', '.'].includes(e.key)) {
                appendValue(e.key);
            } else if (e.key === 'Enter') {
                e.preventDefault();
                calculate();
            } else if (e.key === 'Backspace') {
                del();
            } else if (e.key === 'Escape') {
                clearScreen();
            }
        });
    
    </script>
</body>
</html>
